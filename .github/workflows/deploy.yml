name: Deploy to Server (Clean)

# Activates only when you run it manually from GitHub Actions
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Download the code from the repository
    - name: Get latest code
      uses: actions/checkout@v4

    # 2. Connects to the server and executes deployment commands
    - name: Deploy to server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /var/www
          # Clona el repo si no existe
          if [ ! -d "SHIOL-PLUS" ]; then
            git clone https://github.com/orlandobatistac/SHIOL-PLUS.git
          fi
          cd SHIOL-PLUS
          # Asegura que el código siempre esté alineado a GitHub
          git fetch --all
          git reset --hard origin/main
          # Crea el venv si no existe
          if [ ! -d "venv" ]; then
            python3 -m venv venv
          fi
          source venv/bin/activate
          pip install --no-cache-dir -r requirements-prod.txt
          # Reinicia tu servicio
          sudo systemctl restart shiolplus.service
